<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scenes | 余白と湯気</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Zen+Old+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#f0ede8;--bg-warm:#e8e4dd;--text:#2c2825;--light:#6b6560;--line:#c4beb6;--accent:#8a7e72;--white:#f7f5f2;--font-mincho:'Shippori Mincho','Zen Old Mincho',serif;--font-garamond:'EB Garamond',serif}
    body{font-family:var(--font-mincho);background:var(--bg);color:var(--text);line-height:2.1;letter-spacing:.08em}
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    .page{max-width:1120px;margin:0 auto;padding:48px 24px 96px}
    .topbar{display:flex;justify-content:space-between;gap:24px;margin-bottom:40px}
    .topbar__brand{letter-spacing:.22em;font-size:.9rem}
    .topbar__links{display:flex;gap:24px;font-family:var(--font-garamond);color:var(--accent)}
    .hero{display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center;margin-bottom:72px}
    .hero__image{aspect-ratio:4/5;overflow:hidden;background:var(--bg-warm)}
    .hero__image img{width:100%;height:100%;object-fit:cover}
    .label{font-family:var(--font-garamond);color:var(--accent);font-size:.8rem;letter-spacing:.16em;display:block;margin-bottom:16px}
    .title{font-size:2rem;font-weight:500;letter-spacing:.14em;margin-bottom:18px}
    .lead{color:var(--light);font-size:.92rem;margin-bottom:18px}
    .count{font-family:var(--font-garamond);color:var(--accent);font-size:.86rem}
    .section-title{font-size:1.2rem;font-weight:500;letter-spacing:.14em;margin-bottom:28px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:40px 32px}
    .card{display:block;color:inherit}
    .card__image{aspect-ratio:1/1;overflow:hidden;background:var(--bg-warm);margin-bottom:18px}
    .card__image img{width:100%;height:100%;object-fit:cover}
    .card__name{font-size:1rem;font-weight:500;letter-spacing:.12em;margin-bottom:10px}
    .card__desc{font-size:.82rem;color:var(--light)}
    .card__price{display:block;margin-top:10px;font-family:var(--font-garamond);color:var(--accent)}
    @media (max-width:820px){.page{padding:32px 20px 72px}.hero{grid-template-columns:1fr;gap:28px}.grid{grid-template-columns:1fr}.title{font-size:1.5rem}}
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a class="topbar__brand" href="../index.html">余白と湯気</a>
      <div class="topbar__links">
        <a href="../index.html#scenes">Scenes</a>
        <a href="../products/index.html">Online Store</a>
        <a href="../index.html">Home</a>
      </div>
    </div>
    <section class="hero">
      <div class="hero__image"><img id="sceneImage" src="" alt=""></div>
      <div>
        <span class="label">Scene</span>
        <h1 class="title" id="sceneName"></h1>
        <p class="lead" id="sceneDescription"></p>
        <div class="count" id="sceneCount"></div>
      </div>
    </section>
    <section>
      <h2 class="section-title">この場面に合う道具</h2>
      <div class="grid" id="sceneProducts"></div>
    </section>
  </main>
  <script src="../store-data.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const key = params.get('key') || 'morning';
    const scenes = window.STORE_SCENES || [];
    const products = window.STORE_PRODUCTS || [];
    const scene = scenes.find((item) => item.key === key) || scenes[0];
    const relatedProducts = scene ? products.filter((product) => (product.scenes || []).includes(scene.key)) : [];

    if (scene) {
      document.title = `${scene.name} | 余白と湯気`;
      document.getElementById('sceneImage').src = scene.image;
      document.getElementById('sceneImage').alt = scene.name;
      document.getElementById('sceneName').textContent = scene.name;
      document.getElementById('sceneDescription').textContent = scene.description;
      document.getElementById('sceneCount').textContent = `${relatedProducts.length} items`;
    }

    const grid = document.getElementById('sceneProducts');
    if (grid) {
      grid.innerHTML = relatedProducts.map((product) => `
        <a class="card" href="../products/detail.html?sku=${product.sku}">
          <div class="card__image"><img src="${product.image}" alt="${product.name}"></div>
          <h3 class="card__name">${product.name}</h3>
          <p class="card__desc">${product.short_description}</p>
          <span class="card__price">${product.price}</span>
        </a>
      `).join('');
    }
  </script>
</body>
</html>
