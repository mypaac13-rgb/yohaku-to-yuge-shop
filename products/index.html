<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Store | 余白と湯気</title>
  <meta name="description" content="余白と湯気のオンラインストア。静かな暮らしを整えるための生活道具を紹介します。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Zen+Old+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#f0ede8;--text:#2c2825;--text-light:#6b6560;--line:#c4beb6;--accent:#8a7e72;--font-mincho:'Shippori Mincho','Zen Old Mincho',serif;--font-garamond:'EB Garamond',serif;--content:1080px}
    body{font-family:var(--font-mincho);background:var(--bg);color:var(--text);line-height:2.1;letter-spacing:.08em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    body::after{content:'';position:fixed;inset:0;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E")}
    img{max-width:100%;display:block} a{color:inherit;text-decoration:none}
    .page{max-width:var(--content);margin:0 auto;padding:48px 24px 96px}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:56px;gap:24px}
    .topbar__brand{font-size:.9rem;letter-spacing:.22em}
    .topbar__back{font-family:var(--font-garamond);font-size:.82rem;color:var(--accent);letter-spacing:.08em}
    .hero{margin-bottom:72px;padding-bottom:32px;border-bottom:1px solid var(--line)}
    .hero__label{font-family:var(--font-garamond);font-size:.78rem;color:var(--accent);letter-spacing:.16em;display:block;margin-bottom:18px}
    .hero__title{font-size:2rem;font-weight:500;letter-spacing:.18em;margin-bottom:16px}
    .hero__desc{max-width:640px;color:var(--text-light);font-size:.92rem}
    .category-nav{display:flex;gap:12px;flex-wrap:wrap;margin-top:28px}
    .category-pill{display:inline-block;border:1px solid var(--line);padding:10px 18px;font-size:.8rem;background:rgba(247,245,242,.55)}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:48px 32px}
    .card{display:block}
    .card__image{aspect-ratio:1/1;overflow:hidden;background:var(--line);margin-bottom:18px}
    .card__image img{width:100%;height:100%;object-fit:cover}
    .card__name{font-size:1rem;font-weight:500;margin-bottom:8px}
    .card__desc{font-size:.8rem;color:var(--text-light);margin-bottom:10px}
    .card__price{font-family:var(--font-garamond);color:var(--accent);font-size:.9rem;display:block;margin-bottom:10px}
    .card__meta{font-family:var(--font-garamond);color:var(--accent);font-size:.76rem;letter-spacing:.08em}
    @media (max-width:900px){.grid{grid-template-columns:1fr 1fr}}
    @media (max-width:640px){.page{padding:28px 20px 72px}.topbar{margin-bottom:40px}.hero__title{font-size:1.5rem}.grid{grid-template-columns:1fr;gap:40px}}
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a class="topbar__brand" href="../index.html">余白と湯気</a>
      <a class="topbar__back" href="../index.html">Back to Home</a>
    </div>
    <section class="hero">
      <span class="hero__label">Online Store</span>
      <h1 class="hero__title">静かな暮らしのための道具</h1>
      <p class="hero__desc">商品追加は共通データに一件足すだけで、一覧、カテゴリ、詳細、注文ページに反映できる構成にしています。</p>
      <div class="category-nav">
        <a class="category-pill" href="../categories/index.html">カテゴリ一覧</a>
        <a class="category-pill" href="../categories/category.html?key=drinkware">飲む道具</a>
        <a class="category-pill" href="../categories/category.html?key=organizers">整える道具</a>
        <a class="category-pill" href="../categories/category.html?key=decor">飾る道具</a>
      </div>
    </section>
    <section class="grid" id="storeGrid"></section>
  </main>
  <script src="../store-data.js"></script>
  <script>
    const categories = Object.fromEntries((window.STORE_CATEGORIES || []).map((category) => [category.key, category]));
    const grid = document.getElementById('storeGrid');
    if (grid && window.STORE_PRODUCTS) {
      grid.innerHTML = window.STORE_PRODUCTS.map((product) => `
        <a class="card" href="./detail.html?sku=${product.sku}">
          <div class="card__image"><img src="${product.image}" alt="${product.name}"></div>
          <h2 class="card__name">${product.name}</h2>
          <p class="card__desc">${product.short_description}</p>
          <span class="card__price">${product.price}</span>
          <span class="card__meta">Category: ${(categories[product.category] || {}).name || ''}</span>
        </a>
      `).join('');
    }
  </script>
</body>
</html>
