<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Column | 余白と湯気</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Zen+Old+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#f0ede8;--bg-warm:#e8e4dd;--text:#2c2825;--light:#6b6560;--line:#c4beb6;--accent:#8a7e72;--white:#f7f5f2;--font-mincho:'Shippori Mincho','Zen Old Mincho',serif;--font-garamond:'EB Garamond',serif}
    body{font-family:var(--font-mincho);background:var(--bg);color:var(--text);line-height:2.2;letter-spacing:.08em}
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    .page{max-width:920px;margin:0 auto;padding:48px 24px 96px}
    .topbar{display:flex;justify-content:space-between;gap:24px;margin-bottom:44px}
    .topbar__brand{letter-spacing:.22em;font-size:.9rem}
    .topbar__links{display:flex;gap:24px;font-family:var(--font-garamond);color:var(--accent)}
    .eyebrow{font-family:var(--font-garamond);font-size:.8rem;letter-spacing:.16em;color:var(--accent);display:block;margin-bottom:16px}
    .title{font-size:2rem;font-weight:500;letter-spacing:.14em;margin-bottom:18px}
    .lead{font-size:.94rem;color:var(--light);margin-bottom:40px}
    .hero-image{margin-bottom:48px;background:var(--bg-warm)}
    .hero-image img{width:100%;aspect-ratio:4/3;object-fit:cover}
    .body p{font-size:.92rem;color:var(--light);margin-top:18px}
    .body p:first-child{margin-top:0}
    .back{display:inline-block;margin-top:48px;padding:14px 28px;border:1px solid var(--line)}
    @media (max-width:820px){.page{padding:32px 20px 72px}.title{font-size:1.5rem}}
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a class="topbar__brand" href="../index.html">余白と湯気</a>
      <div class="topbar__links">
        <a href="./index.html">Column</a>
        <a href="../products/index.html">Online Store</a>
        <a href="../index.html">Home</a>
      </div>
    </div>
    <article>
      <span class="eyebrow">Column</span>
      <h1 class="title" id="columnTitle"></h1>
      <p class="lead" id="columnLead"></p>
      <div class="hero-image">
        <img id="columnImage" src="" alt="">
      </div>
      <div class="body" id="columnBody"></div>
      <a class="back" href="./index.html">読みもの一覧へ戻る</a>
    </article>
  </main>
  <script src="../store-data.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const slug = params.get('slug') || 'nameless-tool-on-a-journey';
    const columns = window.STORE_COLUMNS || [];
    const column = columns.find((item) => item.slug === slug) || columns[0];
    if (column) {
      document.title = `${column.title} | 余白と湯気`;
      document.getElementById('columnTitle').textContent = column.title;
      document.getElementById('columnLead').textContent = column.lead;
      document.getElementById('columnImage').src = column.image;
      document.getElementById('columnImage').alt = column.title;
      document.getElementById('columnBody').innerHTML = (column.body || []).map((paragraph) => `<p>${paragraph}</p>`).join('');
    }
  </script>
</body>
</html>
