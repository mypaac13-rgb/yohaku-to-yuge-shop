<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Column | 余白と湯気</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Zen+Old+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#f0ede8;--bg-warm:#e8e4dd;--text:#2c2825;--light:#6b6560;--line:#c4beb6;--accent:#8a7e72;--white:#f7f5f2;--font-mincho:'Shippori Mincho','Zen Old Mincho',serif;--font-garamond:'EB Garamond',serif}
    body{font-family:var(--font-mincho);background:var(--bg);color:var(--text);line-height:2.1;letter-spacing:.08em}
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    .page{max-width:1120px;margin:0 auto;padding:48px 24px 96px}
    .topbar{display:flex;justify-content:space-between;gap:24px;margin-bottom:40px}
    .topbar__brand{letter-spacing:.22em;font-size:.9rem}
    .topbar__links{display:flex;gap:24px;font-family:var(--font-garamond);color:var(--accent)}
    .heading{margin-bottom:56px;text-align:center}
    .heading__en{font-family:var(--font-garamond);font-size:.8rem;letter-spacing:.18em;color:var(--accent);display:block;margin-bottom:16px}
    .heading__ja{font-size:1.4rem;font-weight:500;letter-spacing:.16em}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:56px 40px}
    .card{display:block;color:inherit}
    .card__image{aspect-ratio:4/3;overflow:hidden;background:var(--bg-warm);margin-bottom:24px}
    .card__image img{width:100%;height:100%;object-fit:cover}
    .card__title{font-size:1.2rem;font-weight:500;letter-spacing:.12em;margin-bottom:14px}
    .card__lead{font-size:.88rem;color:var(--light);margin-bottom:14px}
    .card__excerpt{font-size:.84rem;color:var(--light)}
    @media (max-width:820px){.page{padding:32px 20px 72px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a class="topbar__brand" href="../index.html">余白と湯気</a>
      <div class="topbar__links">
        <a href="../index.html#column">Column</a>
        <a href="../products/index.html">Online Store</a>
        <a href="../index.html">Home</a>
      </div>
    </div>
    <div class="heading">
      <span class="heading__en">Column</span>
      <h1 class="heading__ja">読みもの</h1>
    </div>
    <div class="grid" id="columnGrid"></div>
  </main>
  <script src="../store-data.js"></script>
  <script>
    const grid = document.getElementById('columnGrid');
    const columns = window.STORE_COLUMNS || [];
    if (grid) {
      grid.innerHTML = columns.map((column) => `
        <a class="card" href="./detail.html?slug=${column.slug}">
          <div class="card__image"><img src="${column.image}" alt="${column.title}"></div>
          <h2 class="card__title">${column.title}</h2>
          <p class="card__lead">${column.lead}</p>
          <p class="card__excerpt">${column.excerpt}</p>
        </a>
      `).join('');
    }
  </script>
</body>
</html>
