<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カテゴリ一覧 | 余白と湯気</title>
  <meta name="description" content="余白と湯気のオンラインストアカテゴリ一覧。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Zen+Old+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#f0ede8;--text:#2c2825;--light:#6b6560;--line:#c4beb6;--accent:#8a7e72;--font-mincho:'Shippori Mincho','Zen Old Mincho',serif;--font-garamond:'EB Garamond',serif}
    body{font-family:var(--font-mincho);background:var(--bg);color:var(--text);line-height:2.1;letter-spacing:.08em}
    body::after{content:'';position:fixed;inset:0;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E")}
    a{color:inherit;text-decoration:none}
    .page{max-width:1080px;margin:0 auto;padding:48px 24px 96px}
    .topbar{display:flex;justify-content:space-between;gap:24px;margin-bottom:56px}
    .topbar__brand{font-size:.9rem;letter-spacing:.22em}
    .topbar__back{font-family:var(--font-garamond);font-size:.82rem;color:var(--accent)}
    .hero{margin-bottom:56px;padding-bottom:28px;border-bottom:1px solid var(--line)}
    .hero__label{font-family:var(--font-garamond);font-size:.78rem;color:var(--accent);letter-spacing:.16em;display:block;margin-bottom:18px}
    .hero__title{font-size:2rem;font-weight:500;letter-spacing:.18em;margin-bottom:14px}
    .hero__desc{max-width:680px;color:var(--light);font-size:.92rem}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
    .card{display:block;padding:28px;border:1px solid var(--line);background:rgba(247,245,242,.55)}
    .card__label{font-family:var(--font-garamond);font-size:.78rem;color:var(--accent);margin-bottom:10px;display:block}
    .card__title{font-size:1.2rem;font-weight:500;margin-bottom:12px}
    .card__desc{font-size:.86rem;color:var(--light);margin-bottom:16px}
    .card__link{font-family:var(--font-garamond);font-size:.82rem;color:var(--accent)}
    @media (max-width:820px){.grid{grid-template-columns:1fr}.page{padding:32px 20px 72px}.hero__title{font-size:1.5rem}}
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a class="topbar__brand" href="../index.html">余白と湯気</a>
      <a class="topbar__back" href="../products/index.html">Online Store</a>
    </div>
    <section class="hero">
      <span class="hero__label">Categories</span>
      <h1 class="hero__title">道具の気配から選ぶ</h1>
      <p class="hero__desc">商品追加は共通データに1件足すだけで、カテゴリ一覧にも個別カテゴリにも反映できる構成です。</p>
    </section>
    <section class="grid" id="categoryGrid"></section>
  </main>
  <script src="../store-data.js"></script>
  <script>
    const grid = document.getElementById('categoryGrid');
    if (grid && window.STORE_CATEGORIES) {
      grid.innerHTML = window.STORE_CATEGORIES.map((category, index) => `
        <a class="card" href="./category.html?key=${category.key}">
          <span class="card__label">Category ${String(index + 1).padStart(2, '0')}</span>
          <h2 class="card__title">${category.name}</h2>
          <p class="card__desc">${category.description}</p>
          <span class="card__link">View Category</span>
        </a>
      `).join('');
    }
  </script>
</body>
</html>
