<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カテゴリー | 余白と湯気</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Zen+Old+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#f0ede8;--text:#2c2825;--light:#6b6560;--line:#c4beb6;--accent:#8a7e72;--font-mincho:'Shippori Mincho','Zen Old Mincho',serif;--font-garamond:'EB Garamond',serif}
    body{font-family:var(--font-mincho);background:var(--bg);color:var(--text);line-height:2.1;letter-spacing:.08em}
    body::after{content:'';position:fixed;inset:0;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E")}
    a{color:inherit;text-decoration:none} img{display:block;max-width:100%}
    .page{max-width:1080px;margin:0 auto;padding:48px 24px 96px}
    .topbar{display:flex;justify-content:space-between;gap:24px;margin-bottom:56px}
    .topbar__brand{font-size:.9rem;letter-spacing:.22em}
    .topbar__back{font-family:var(--font-garamond);font-size:.82rem;color:var(--accent)}
    .hero{margin-bottom:48px;padding-bottom:28px;border-bottom:1px solid var(--line)}
    .hero__label{font-family:var(--font-garamond);font-size:.78rem;color:var(--accent);display:block;margin-bottom:16px}
    .hero__title{font-size:1.8rem;font-weight:500;letter-spacing:.16em;margin-bottom:12px}
    .hero__desc{max-width:640px;color:var(--light);font-size:.9rem}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
    .card__image{aspect-ratio:1/1;overflow:hidden;margin-bottom:16px;background:var(--line)}
    .card__image img{width:100%;height:100%;object-fit:cover}
    .card__name{font-size:1rem;font-weight:500;margin-bottom:8px}
    .card__desc{color:var(--light);font-size:.82rem;margin-bottom:10px}
    .card__price{font-family:var(--font-garamond);font-size:.88rem;color:var(--accent)}
    @media (max-width:900px){.grid{grid-template-columns:1fr 1fr}}
    @media (max-width:700px){.grid{grid-template-columns:1fr}.page{padding:32px 20px 72px}}
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a class="topbar__brand" href="../index.html">余白と湯気</a>
      <a class="topbar__back" href="./index.html">Categories</a>
    </div>
    <section class="hero">
      <span class="hero__label">Category</span>
      <h1 class="hero__title" id="categoryName"></h1>
      <p class="hero__desc" id="categoryDesc"></p>
    </section>
    <section class="grid" id="categoryProducts"></section>
  </main>
  <script src="../store-data.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const key = params.get('key') || 'drinkware';
    const categories = window.STORE_CATEGORIES || [];
    const products = window.STORE_PRODUCTS || [];
    const category = categories.find((item) => item.key === key) || categories[0];
    const categoryProducts = products.filter((item) => item.category === category.key);
    document.title = `${category.name} | 余白と湯気`;
    document.getElementById('categoryName').textContent = category.name;
    document.getElementById('categoryDesc').textContent = category.description;
    document.getElementById('categoryProducts').innerHTML = categoryProducts.map((product) => `
      <a class="card" href="../products/detail.html?sku=${product.sku}">
        <div class="card__image"><img src="${product.image}" alt="${product.name}"></div>
        <h2 class="card__name">${product.name}</h2>
        <p class="card__desc">${product.short_description}</p>
        <span class="card__price">${product.price}</span>
      </a>
    `).join('');
  </script>
</body>
</html>
